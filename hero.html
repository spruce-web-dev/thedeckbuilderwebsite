<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deck Hero Section</title>
  <link rel="stylesheet" href="./css/hero-section.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- Hero Section -->
<section class="hero-section hero-bg grid-pattern">
  <!-- Decorative elements -->
  <div class="decorative-circle decorative-circle--red"></div>
  <div class="decorative-circle decorative-circle--blue"></div>

  <div class="hero-container">
    <div class="hero-grid">
      <div class="hero-content">
        <div class="wood-accent reveal"></div>
        
        <h1 class="hero-title reveal reveal-delay-1">
          BUILD YOUR<br>
          <span class="text-red">OUTDOOR</span><br>
          DREAM SPACE
        </h1>
        
        <p class="hero-text reveal reveal-delay-2">
          Custom deck design and construction for homeowners who demand quality craftsmanship, premium materials, and outdoor spaces that last a lifetime.
        </p>
        
        <div class="hero-actions reveal reveal-delay-3">
          <a href="#contact" class="btn-primary">Start Your Project</a>
          <a href="#projects" class="btn-secondary">View Our Work</a>
        </div>

        <!-- Stats -->
        <div class="stats-grid reveal reveal-delay-4">
          <div class="stat-item">
            <div class="stat-number font-display">500+</div>
            <div class="stat-label">Decks Built</div>
          </div>
          <div class="stat-item">
            <div class="stat-number font-display">15</div>
            <div class="stat-label">Years Experience</div>
          </div>
          <div class="stat-item">
            <div class="stat-number font-display">100%</div>
            <div class="stat-label">Satisfaction</div>
          </div>
        </div>
      </div>

      <!-- Deck Illustration -->
      <div class="deck-illustration">
        <div class="deck-canvas">
          <!-- Stylized deck layers -->
          <div class="deck-layer deck-layer--1"></div>
          <div class="deck-layer deck-layer--2"></div>
          <div class="deck-layer deck-layer--3"></div>
          
          <!-- Accent shapes -->
          <div class="accent-shape accent-shape--square"></div>
          <div class="accent-shape accent-shape--circle"></div>
          <div class="accent-shape accent-shape--line"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator">
    <span class="scroll-text">SCROLL</span>
    <div class="scroll-line"></div>
  </div>
</section>

</body>
</html>
